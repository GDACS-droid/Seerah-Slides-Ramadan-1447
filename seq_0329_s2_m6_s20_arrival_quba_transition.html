<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; }
        .slide-container {
            width: 1280px;
            min-height: 720px;
            background-color: #FDFBF7;
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.5' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E");
            position: relative;
            font-family: 'Lato', sans-serif;
            color: #3E2723;
            display: flex;
            flex-direction: column;
            border: 20px solid #FDFBF7;
            padding-bottom: 60px;
        }

        .border-frame {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            bottom: 20px;
            border: 2px solid #C5A059;
            pointer-events: none;
            z-index: 1;
        }

        .header {
            padding: 60px 80px 30px;
            text-align: center;
            z-index: 10;
        }

        .main-title {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            color: #1A3C40;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #8D6E63;
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .content-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0 100px;
            flex: 1;
            z-index: 10;
        }

        .quote-container {
            text-align: center;
            margin-bottom: 40px;
        }

        .quote-text {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: #1A3C40;
            margin-bottom: 15px;
            line-height: 1.2;
        }

        .quote-source {
            font-size: 1.1rem;
            color: #8D6E63;
            font-style: italic;
        }

        .event-details {
            display: flex;
            gap: 40px;
            margin-bottom: 50px;
        }

        .detail-item {
            display: flex;
            align-items: center;
            background-color: #fff;
            padding: 15px 25px;
            border: 1px solid #C5A059;
            border-radius: 30px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .detail-icon {
            color: #1A3C40;
            margin-right: 15px;
            font-size: 1.2rem;
        }

        .detail-text {
            font-size: 1rem;
            color: #5D4037;
        }

        .transition-box {
            background-color: #1A3C40;
            color: #FDFBF7;
            padding: 20px 40px;
            text-align: center;
            border: 2px solid #C5A059;
            position: relative;
        }

        .transition-label {
            font-size: 0.9rem;
            color: #C5A059;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .transition-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="border-frame"></div>
        
        <div class="header">
            <h1 class="main-title">Arrival at Qubā'</h1>
            <div class="subtitle">A New Era Begins</div>
        </div>

        <div class="content-wrapper">
            <div class="quote-container">
                <div class="quote-text">"O Children of Qaylah!<br>Your Fortune has arrived!"</div>
                <div class="quote-source">— Announcement from the fortress of Qubā'</div>
            </div>

            <div class="event-details">
                <div class="detail-item">
                    <div class="detail-icon"><i class="far fa-calendar-alt"></i></div>
                    <div class="detail-text">Monday, 12th Rabī' al-Awwal</div>
                </div>
                <div class="detail-item">
                    <div class="detail-icon"><i class="fas fa-map-marker-alt"></i></div>
                    <div class="detail-text">Qubā' (Outskirts of Yathrib)</div>
                </div>
                <div class="detail-item">
                    <div class="detail-icon"><i class="fas fa-mosque"></i></div>
                    <div class="detail-text">First Foundation: Masjid Qubā'</div>
                </div>
            </div>

            <div class="transition-box">
                <div class="transition-label">Coming Up Next</div>
                <div class="transition-title">Session III: The Madinan Period</div>
            </div>
        </div>
    </div>
</body>
</html>
