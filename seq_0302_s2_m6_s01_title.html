<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; }
        .slide-container {
            width: 1280px;
            min-height: 720px;
            background-color: #FDFBF7;
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.5' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E");
            position: relative;
            font-family: 'Lato', sans-serif;
            color: #3E2723;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 20px solid #FDFBF7;
            text-align: center;
        }

        .border-frame {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            bottom: 20px;
            border: 2px solid #C5A059;
            pointer-events: none;
            z-index: 1;
        }

        .title-content {
            z-index: 10;
            max-width: 800px;
        }

        .session-tag {
            font-family: 'Lato', sans-serif;
            font-size: 1.2rem;
            letter-spacing: 3px;
            color: #C5A059;
            text-transform: uppercase;
            margin-bottom: 20px;
            font-weight: 700;
        }

        .main-title {
            font-family: 'Playfair Display', serif;
            font-size: 4rem;
            color: #1A3C40;
            margin-bottom: 20px;
            line-height: 1.2;
        }

        .subtitle {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            color: #8D6E63;
            font-style: italic;
            margin-bottom: 40px;
        }

        .ornament {
            font-size: 2rem;
            color: #C5A059;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="border-frame"></div>
        <div class="title-content">
            <div class="session-tag">Session II • Module 6</div>
            <h1 class="main-title">The Year of Sorrow & The Night Journey</h1>
            <div class="subtitle">'Ām al-Ḥuzn wa al-Isrā' wa al-Mi'rāj</div>
            <div class="ornament"><i class="fas fa-star-and-crescent"></i></div>
        </div>
    </div>
</body>
</html>
