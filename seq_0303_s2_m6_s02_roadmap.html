<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; }
        .slide-container {
            width: 1280px;
            min-height: 720px;
            background-color: #FDFBF7;
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.5' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E");
            position: relative;
            font-family: 'Lato', sans-serif;
            color: #3E2723;
            display: flex;
            flex-direction: column;
            border: 20px solid #FDFBF7;
            padding-bottom: 60px;
        }

        .border-frame {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            bottom: 20px;
            border: 2px solid #C5A059;
            pointer-events: none;
            z-index: 1;
        }

        .header {
            padding: 60px 80px 20px;
            text-align: center;
            z-index: 10;
        }

        .main-title {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            color: #1A3C40;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #8D6E63;
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .timeline-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0 60px;
            z-index: 10;
        }

        .timeline-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            width: 100%;
            max-width: 1000px;
            position: relative;
        }

        .timeline-line {
            position: absolute;
            top: 25px;
            left: 50px;
            right: 50px;
            height: 2px;
            background-color: #C5A059;
            z-index: 1;
        }

        .timeline-point {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 180px;
            position: relative;
            z-index: 2;
        }

        .point-marker {
            width: 50px;
            height: 50px;
            background-color: #1A3C40;
            border: 3px solid #C5A059;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #FDFBF7;
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: 1.2rem;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .point-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            color: #1A3C40;
            font-weight: 700;
            text-align: center;
            margin-bottom: 10px;
        }

        .point-desc {
            font-size: 0.9rem;
            color: #5D4037;
            text-align: center;
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="border-frame"></div>
        
        <div class="header">
            <h1 class="main-title">Module Roadmap</h1>
            <div class="subtitle">From Sorrow to Divine Ascension</div>
        </div>

        <div class="timeline-container">
            <div class="timeline-wrapper">
                <div class="timeline-line"></div>
                
                <div class="timeline-point">
                    <div class="point-marker">01</div>
                    <div class="point-title">The Year of Sorrow</div>
                    <div class="point-desc">Deaths of Abū Ṭālib & Khadījah</div>
                </div>

                <div class="timeline-point">
                    <div class="point-marker">02</div>
                    <div class="point-title">The Journey to Ṭā'if</div>
                    <div class="point-desc">Rejection & Divine Comfort</div>
                </div>

                <div class="timeline-point">
                    <div class="point-marker">03</div>
                    <div class="point-title">Isrā' & Mi'rāj</div>
                    <div class="point-desc">The Night Journey & Ascension</div>
                </div>

                <div class="timeline-point">
                    <div class="point-marker">04</div>
                    <div class="point-title">Pledges of 'Aqabah</div>
                    <div class="point-desc">Preparing for Migration</div>
                </div>

                <div class="timeline-point">
                    <div class="point-marker">05</div>
                    <div class="point-title">The Hijrah</div>
                    <div class="point-desc">Departure to Madīnah</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
